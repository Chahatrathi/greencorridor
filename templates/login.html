<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Secure Login | Green Corridor</title>
    <style>
        :root { --accent: #06b6d4; --bg: #020617; }
        body { background: var(--bg); color: white; font-family: sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .login-box { background: #0f172a; border: 1px solid rgba(6,182,212,0.2); padding: 40px; border-radius: 20px; width: 380px; text-align: center; }
        .tabs { display: flex; background: rgba(0,0,0,0.4); padding: 5px; border-radius: 10px; margin-bottom: 30px; }
        .tab { flex: 1; padding: 12px; background: transparent; color: #475569; border: none; cursor: pointer; font-weight: bold; border-radius: 8px; transition: 0.3s; }
        .tab.active { background: var(--accent); color: white; }
        input { width: 100%; padding: 15px; margin-bottom: 15px; background: rgba(0,0,0,0.3); border: 1px solid #334155; border-radius: 8px; color: white; box-sizing: border-box; }
        .login-btn { display: block; width: 100%; padding: 16px; background: var(--accent); border: none; color: white; border-radius: 8px; font-weight: bold; cursor: pointer; }
    </style>
</head>
<body>
    <div class="login-box">
        <div class="tabs">
            <button class="tab active" onclick="setMode('admin')">ADMIN</button>
            <button class="tab" onclick="setMode('driver')">DRIVER</button>
        </div>
        <h2 id="title">COMMAND CENTER</h2>
        <input type="text" placeholder="ACCESS ID">
        <input type="password" placeholder="SECURITY KEY">
        <button class="login-btn" onclick="handleLogin()">VERIFY IDENTITY</button>
    </div>
    <script>
        let mode = 'admin';
        function setMode(m) { 
            mode = m; 
            document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
            event.target.classList.add('active');
            document.getElementById('title').innerText = m === 'admin' ? "COMMAND CENTER" : "VEHICLE TERMINAL";
        }
        function handleLogin() { window.location.href = mode === 'admin' ? "/dashboard" : "/ambulance"; }
    </script>
</body>
</html>
