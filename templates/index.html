<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Green Corridor | AI Emergency Grid</title>
    <style>
        :root { --accent: #06b6d4; --bg: #020617; --danger: #ef4444; }
        
        body { 
            margin: 0; 
            background: var(--bg); 
            background-image: radial-gradient(circle at 50% 50%, #0f172a 0%, #020617 100%);
            color: white; 
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            height: 100vh; 
            overflow: hidden;
        }

        /* Scanline effect for that HUD feel */
        body::before {
            content: " ";
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.25) 50%), 
                        linear-gradient(90deg, rgba(255, 0, 0, 0.06), rgba(0, 255, 0, 0.02), rgba(0, 0, 255, 0.06));
            background-size: 100% 4px, 3px 100%;
            pointer-events: none;
            z-index: 2;
        }

        .hero { 
            text-align: center; 
            position: relative;
            padding: 80px; 
            border-radius: 40px; 
            background: rgba(15, 23, 42, 0.7); 
            border: 1px solid rgba(6, 182, 212, 0.3);
            backdrop-filter: blur(10px);
            box-shadow: 0 0 50px rgba(0, 0, 0, 0.5), inset 0 0 20px rgba(6, 182, 212, 0.1);
            z-index: 5;
        }

        .status-line {
            color: #22c55e;
            font-family: 'Courier New', Courier, monospace;
            font-size: 14px;
            letter-spacing: 3px;
            margin-bottom: 10px;
            animation: blink 1.5s step-end infinite;
        }

        h1 { 
            font-size: 4.5rem; 
            margin: 0; 
            font-weight: 900;
            background: linear-gradient(180deg, #fff 0%, #06b6d4 100%);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
            letter-spacing: -2px;
            line-height: 1;
        }

        .subtitle {
            color: #94a3b8;
            letter-spacing: 6px;
            margin-top: 15px;
            font-size: 0.9rem;
            text-transform: uppercase;
            font-weight: 300;
        }

        .btn { 
            display: inline-block; 
            margin-top: 50px; 
            padding: 18px 50px; 
            background: transparent;
            border: 1px solid var(--accent); 
            color: var(--accent); 
            text-decoration: none; 
            border-radius: 4px; 
            font-weight: bold; 
            font-size: 1.1rem;
            letter-spacing: 2px;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            text-transform: uppercase;
        }

        .btn:hover { 
            background: var(--accent); 
            color: #000; 
            box-shadow: 0 0 40px rgba(6, 182, 212, 0.6);
            transform: translateY(-5px);
        }

        @keyframes blink {
            from, to { opacity: 1; }
            50% { opacity: 0.3; }
        }

        /* Decorative Grid Background */
        .grid-bg {
            position: absolute;
            width: 200%; height: 200%;
            background-image: 
                linear-gradient(to right, rgba(6, 182, 212, 0.05) 1px, transparent 1px),
                linear-gradient(to bottom, rgba(6, 182, 212, 0.05) 1px, transparent 1px);
            background-size: 50px 50px;
            transform: perspective(500px) rotateX(60deg);
            bottom: -50%;
            z-index: 1;
            animation: moveGrid 20s linear infinite;
        }

        @keyframes moveGrid {
            from { transform: perspective(500px) rotateX(60deg) translateY(0); }
            to { transform: perspective(500px) rotateX(60deg) translateY(50px); }
        }
    </style>
</head>
<body>

    <div class="grid-bg"></div>

    <div class="hero">
        <div class="status-line">● IOT CORE INTERFACE READY</div>
        <h1>NORTHERN GRID</h1>
        <div class="subtitle">AI-Integrated Green Corridor Protocol</div>
        
        <p style="font-size: 14px; color: #475569; margin-top: 30px; max-width: 400px; margin-left: auto; margin-right: auto;">
            Real-time traffic synchronization and IoT signal override system for emergency medical response.
        </p>

        <a href="/login" class="btn">INITIALIZE CORE</a>
        
        <div style="margin-top: 40px; font-size: 10px; color: #1e293b; letter-spacing: 2px;">
            SECURE ACCESS ONLY | ENCRYPTED LINK 0x7F
        </div>
    </div>

</body>
</html>
